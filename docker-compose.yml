services:
  data-permissions:
    image: busybox:1.36
    container_name: fastygo-cms-data-permissions
    restart: "no"
    user: "0:0"
    command:
      - sh
      - -c
      - >
        mkdir -p /data
        && chown -R ${GOCMS_DATA_UID:-65532}:${GOCMS_DATA_GID:-65532} /data
        && chmod u+rwX /data
    volumes:
      - ${GOCMS_DATA_DIR:-./data}:/data

  cms:
    build:
      context: .
    image: fastygo/cms:local
    container_name: fastygo-cms
    depends_on:
      data-permissions:
        condition: service_completed_successfully
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp
    environment:
      APP_BIND: 0.0.0.0:8080
      APP_DATA_SOURCE: file:/data/gocms.db
      APP_SESSION_KEY: ${APP_SESSION_KEY:-gocms-development-session-key-change-me}
      GOCMS_PRESET: full
      GOCMS_STORAGE_PROFILE: sqlite
      GOCMS_DEPLOYMENT_PROFILE: container
      GOCMS_SEED_FIXTURES: ${GOCMS_SEED_FIXTURES:-true}
      HEALTHCHECK_URL: http://127.0.0.1:8080/readyz
    ports:
      - "127.0.0.1:18055:8080"
    volumes:
      - ${GOCMS_DATA_DIR:-./data}:/data
    healthcheck:
      test: ["CMD", "/healthcheck"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 25s
